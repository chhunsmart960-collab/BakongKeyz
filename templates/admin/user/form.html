{% extends 'admin/layout/master.html' %}
{% block page_title %}
    Admin | User Form
{% endblock %}
{% block content %}
<style>
    /* Keyz Store Admin Overrides */
    .content-wrapper { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
    h1.m-0 { font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

    .card { border: 1px solid #000 !important; border-radius: 0 !important; box-shadow: none !important; margin-top: 15px; }
    .card-header { background: #fff !important; border-bottom: 1px solid #e0e0e0 !important; padding: 20px; }

    .form-control { border-radius: 0; border: 1px solid #e0e0e0; padding: 12px; height: auto; font-family: 'Inter', sans-serif; }
    .form-control:focus { border-color: #000; box-shadow: none; }
    label { font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 8px; }

    .btn { border-radius: 0 !important; text-transform: uppercase; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; padding: 12px 24px; transition: 0.3s; }
    .btn-primary, .btn-warning { background-color: #000 !important; border-color: #000 !important; color: #fff !important; }
    .btn-primary:hover, .btn-warning:hover { background-color: #fff !important; color: #000 !important; }
    .btn-danger { background-color: transparent !important; border: 1px solid #e0e0e0 !important; color: #555 !important; }
    .btn-danger:hover { border-color: #000 !important; color: #000 !important; }
    .btn-outline-secondary { color: #000; border-color: transparent; padding-left: 0; }
    .btn-outline-secondary:hover { background: transparent; color: #555; text-decoration: underline; }

    input[type=file] { padding: 8px; }
</style>

<div class="content-wrapper">
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2 mt-2">
          <div class="col-sm-6">
            <h1 class="m-0">{{ 'Edit' if status == 'edit' else 'Add' }} User</h1>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
        <div class="container-fluid">
            <div class="card p-0">
                <div class="card-header border-0">
                    <a href="{{ url_for('users') }}" class="btn btn-outline-secondary">← Back to Directory</a>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data"
                          action="{{ url_for('add_user') if status=='add' else url_for('edit_user') }}">

                        <div class="form-group mb-4">
                            <label>Username</label>
                            <input type="text" class="form-control" name="username"
                                   value="{{ user.username if status=='edit' }}"
                                   placeholder="e.g., admin_user" required>
                        </div>

                        <div class="form-group mb-4">
                            <label>Password</label>
                            <input type="password" class="form-control" name="password"
                                   placeholder="Enter secure password" {% if status=='add' %}required{% endif %}>
                        </div>

                        <div class="form-group mb-4">
                            <label>Profile Image</label>
                            <input type="file" class="form-control" name="profile" style="border-style: dashed;">
                        </div>

                        <div class="clearfix mt-5 pt-4 border-top">
                            {% if status=='edit' %}
                                <input type="hidden" name="user_id" value="{{ user.id }}">
                                <input type="hidden" name="old_profile" value="{{ user.profile }}">
                                <a href="{{ url_for('users') }}" class="btn btn-danger float-left">Cancel</a>
                                <button type="submit" class="btn btn-warning float-right">Update User</button>
                            {% else %}
                                <a href="{{ url_for('users') }}" class="btn btn-danger float-left">Cancel</a>
                                <button type="submit" class="btn btn-primary float-right">Save User</button>
                            {% endif %}
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
