<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block page_title %}{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static',filename='admin/plugins/fontawesome-free/css/all.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static',filename='admin/dist/css/adminlte.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static',filename='admin/main.css') }}">

  <style>
    body { font-family: 'Inter', sans-serif !important; background-color: #f9f9f9; }

    /* Navbar styling */
    .main-header { border-bottom: 2px solid #000 !important; box-shadow: none !important; }
    .navbar-light .navbar-nav .nav-link { color: #000 !important; text-transform: uppercase; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; }
    .navbar-light .navbar-nav .nav-link:hover { color: #555 !important; }

    /* Sidebar styling */
    .main-sidebar { background-color: #000 !important; border-right: 2px solid #000; }
    .brand-link { border-bottom: 1px solid #333 !important; text-transform: uppercase; font-weight: 800 !important; letter-spacing: -0.5px; color: #fff !important; }
    .brand-link:hover { color: #fff !important; }

    /* User Panel */
    .user-panel { border-bottom: 1px solid #333 !important; }
    .user-panel .info a { color: #fff !important; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }

    /* Sidebar Menu */
    .nav-sidebar .nav-item .nav-link { border-radius: 0 !important; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; color: #a0a0a0; }
    .nav-sidebar .nav-item .nav-link:hover { color: #fff; background-color: #1a1a1a; }
    .sidebar-dark-orange .nav-sidebar > .nav-item > .nav-link.active,
    .sidebar-dark-primary .nav-sidebar > .nav-item > .nav-link.active {
        background-color: #fff !important;
        color: #000 !important;
        border-radius: 0 !important;
        font-weight: 800;
    }
    .sidebar-dark-orange .nav-sidebar > .nav-item > .nav-link.active i { color: #000 !important; }

    /* Footer */
    .main-footer { border-top: 2px solid #000 !important; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #555; background: #fff; }
    .main-footer strong { color: #000; font-weight: 800; }
  </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item d-none d-sm-inline-block">
        <a href="#" class="nav-link">Home</a>
      </li>
      <li class="nav-item d-none d-sm-inline-block">
        <a href="#" class="nav-link">Contact</a>
      </li>
    </ul>

    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <a class="nav-link" data-widget="fullscreen" href="#" role="button">
          <i class="fas fa-expand-arrows-alt"></i>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-widget="control-sidebar" data-slide="true" href="#" role="button">
          <i class="fas fa-th-large"></i>
        </a>
      </li>
    </ul>
  </nav>
  <aside class="main-sidebar sidebar-dark-primary elevation-0">
    <a href="#" class="brand-link">
      <span class="brand-text font-weight-light">Keyz Store | Admin</span>
    </a>

    <div class="sidebar">
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="info">
          <a href="#" class="d-block">{{ session.username }}</a>
        </div>
      </div>

      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item">
            <a href="{{ url_for('dashboards') }}" class="nav-link {{ 'active' if module == 'dashboard' }}">
              <i class="nav-icon fas fa-th"></i>
              <p>Dashboard</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ url_for('products') }}" class="nav-link {{ 'active' if module == 'product' }}">
              <i class="nav-icon fab fa-product-hunt"></i>
              <p>Product</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ url_for('categorys') }}" class="nav-link {{ 'active' if module == 'category' }}">
              <i class="nav-icon fas fa-cubes"></i>
              <p>Category</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ url_for('orders') }}" class="nav-link {{ 'active' if module == 'order' }}">
              <i class="nav-icon fas fa-credit-card"></i>
              <p>Order</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ url_for('customers') }}" class="nav-link {{ 'active' if module == 'customer' }}">
              <i class="nav-icon fas fa-users"></i>
              <p>Customer</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ url_for('users') }}" class="nav-link {{ 'active' if module == 'user' }}">
              <i class="nav-icon fas fa-key"></i>
              <p>User</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ url_for('logout') }}" class="nav-link {{ 'active' if module == 'logout' }}">
              <i class="nav-icon fas fa-sign-out-alt"></i>
              <p>Logout</p>
            </a>
          </li>
        </ul>
      </nav>
      </div>
    </aside>

  {% block content %}
  {% endblock %}
  <aside class="control-sidebar control-sidebar-dark">
    <div class="p-3">
      <h5 style="font-weight: 800; text-transform: uppercase;">Settings</h5>
      <p style="font-size: 0.85rem; color: #a0a0a0;">Sidebar content</p>
    </div>
  </aside>
  <footer class="main-footer">
    <div class="float-right d-none d-sm-inline">
      Keyz Store Backend System
    </div>
    <strong>Copyright &copy; 2026 Keyz Store.</strong> All rights reserved.
  </footer>
</div>
<script src="{{ url_for('static',filename='admin/plugins/jquery/jquery.min.js') }}"></script>
<script src="{{ url_for('static',filename='admin/plugins/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static',filename='admin/dist/js/adminlte.min.js') }}"></script>
</body>
</html>
