{% extends 'pageFront/master.html' %}
{% block content %}
<style>
  .pd-back {
    display: inline-block; font-weight: 600; color: #000;
    text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
    margin-bottom: 30px; border-bottom: 1px solid #000; text-decoration: none;
  }
  .pd-back:hover { color: #555; text-decoration: none; border-color: #555; }

  .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
  .pd-img-wrap img { width: 100%; height: auto; border: 1px solid #e0e0e0; }

  .pd-badge {
    display: inline-block; border: 1px solid #000; padding: 4px 12px;
    font-size: 0.75rem; text-transform: uppercase; font-weight: 600; margin-bottom: 20px;
  }
  .pd-title { font-weight: 800; font-size: 3rem; line-height: 1.1; text-transform: uppercase; margin-bottom: 15px; }
  .pd-desc-text { font-size: 1rem; color: #555; line-height: 1.6; margin-bottom: 30px; }
  .pd-price-row { font-weight: 800; font-size: 2rem; margin-bottom: 30px; }

  .pd-actions { display: flex; gap: 15px; margin-bottom: 20px; }
  .pd-qty-ctrl { display: flex; border: 1px solid #000; }
  .pd-qty-btn { width: 50px; height: 50px; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; }
  .pd-qty-btn:hover { background: #f0f0f0; }
  .pd-qty-num { width: 50px; display: flex; align-items: center; justify-content: center; font-weight: 600; border-left: 1px solid #000; border-right: 1px solid #000; }

  .pd-btn-cart {
    flex: 1; background: #000; color: #fff; border: 1px solid #000;
    text-transform: uppercase; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
  }
  .pd-btn-cart:hover { background: #fff; color: #000; }

  .pd-subtotal { font-size: 0.85rem; color: #777; text-transform: uppercase; letter-spacing: 1px; }
  .pd-success { font-size: 0.85rem; font-weight: 600; color: #000; opacity: 0; transition: 0.3s; margin-top: 10px; text-transform: uppercase;}
  .pd-success.show { opacity: 1; }

  @media (max-width: 768px) { .pd-grid { grid-template-columns: 1fr; gap: 30px; } }
</style>

<div>
  <a href="{{ url_for('home') }}" class="pd-back">Back to Catalog</a>

  <div class="pd-grid">
    <div class="pd-img-wrap">
      <img src="{{ product.image }}">
    </div>

    <div class="pd-right">
      <span class="pd-badge">{{ product.category or 'Essential' }}</span>
      <h1 class="pd-title">{{ product.name }}</h1>
      <div class="pd-price-row">{{ product.price }} ៛</div>
      <p class="pd-desc-text">{{ product.description }}</p>

      <div class="pd-actions">
        <div class="pd-qty-ctrl">
          <button class="pd-qty-btn" onclick="changeQty(-1)">-</button>
          <span class="pd-qty-num" id="qty-display">1</span>
          <button class="pd-qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="pd-btn-cart" id="cart-btn" onclick="addToCart()">Add to Cart</button>
      </div>

      <div class="pd-subtotal">Subtotal: <strong id="subtotal">{{ product.price }} ៛</strong></div>
      <div class="pd-success" id="success-msg">Item Added</div>
    </div>
  </div>
</div>

<script>
let qty = 1;
let price = {{ product.price }};
let productId = {{ product.id }};

function changeQty(v){
  qty = Math.max(1, qty + v);
  document.getElementById("qty-display").innerText = qty;
  document.getElementById("subtotal").innerText = (qty * price).toFixed(2) + " ៛";
}

function addToCart(){
  fetch("/cart/add", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ product_id: productId, qty: qty })
  }).then(res => res.json()).then(data => {
    if (data.success) {
      document.getElementById("success-msg").classList.add("show");
      setTimeout(() => document.getElementById("success-msg").classList.remove("show"), 1500);
    } else { alert("Failed to add to cart"); }
  }).catch(() => alert("Server error"));
}
</script>
{% endblock %}
