{% extends 'pageFront/master.html' %}
{% block content %}

<style>
.payment-page {
  padding: 60px 0;
  display: flex;
  justify-content: center;
}

.checkout-card {
  width: 100%;
  max-width: 500px;
  background: #fff;
  border: 1px solid #000;
  border-radius: 0; /* Sharp edges */
}

.checkout-header {
  border-bottom: 1px solid #000;
  padding: 30px;
  text-align: center;
}

.checkout-header h2 {
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 5px;
  font-size: 2rem;
}

.checkout-header p {
  color: #555;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 0;
}

.checkout-body {
  padding: 30px;
}

.field {
  margin-bottom: 20px;
}

.field input {
  width: 100%;
  padding: 15px;
  border: 1px solid #e0e0e0;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  transition: border-color 0.3s;
}

.field input:focus {
  outline: none;
  border-color: #000;
}

.btn {
  width: 100%;
  background: #000;
  color: #fff;
  border: 1px solid #000;
  padding: 18px;
  font-size: 1rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn:hover {
  background: #fff;
  color: #000;
}
</style>

<div class="payment-page">
  <div class="checkout-card">
    <div class="checkout-header">
      <h2>Checkout</h2>
      <p>Secure Payment</p>
    </div>
    <div class="checkout-body">
      <form action="{{ url_for('payment') }}" method="POST">
        <div class="field">
          <input type="text" name="customer_name" placeholder="Full Name" required>
        </div>
        <div class="field">
          <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="field">
          <input type="text" name="phone" placeholder="Phone Number" required>
        </div>
        <div class="field">
          <input type="text" name="address" placeholder="Shipping Address" required>
        </div>
        <button type="submit" class="btn">Proceed to Payment</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
