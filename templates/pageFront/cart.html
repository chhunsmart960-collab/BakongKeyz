{% extends 'pageFront/master.html' %}
{% block content %}
<style>
  .cart-title {
    font-weight: 800; font-size: 2.5rem; text-transform: uppercase;
    border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 30px;
  }
  .cart-item {
    display: grid; grid-template-columns: 2fr 1fr 1fr auto;
    align-items: center; gap: 20px; padding: 20px 0;
    border-bottom: 1px solid #e0e0e0;
  }
  .cart-left { display: flex; align-items: center; gap: 20px; }
  .cart-left img { width: 80px; height: 100px; object-fit: cover; border: 1px solid #e0e0e0; }
  .cart-name { font-weight: 600; text-transform: uppercase; font-size: 1.1rem; }
  .cart-price { color: #555; font-size: 0.9rem; margin-top: 4px; }
  .qty-box { display: flex; align-items: center; border: 1px solid #000; width: fit-content; }
  .qty-btn { width: 35px; height: 35px; background: transparent; border: none; cursor: pointer; font-weight: 600; }
  .qty-btn:hover { background: #f0f0f0; }
  .qty-input { width: 40px; text-align: center; border: none; border-left: 1px solid #000; border-right: 1px solid #000; font-weight: 600; }
  .qty-input:focus { outline: none; }
  .subtotal { font-weight: 800; font-size: 1.1rem; }
  .remove-btn { background: transparent; border: none; color: #999; cursor: pointer; text-decoration: underline; font-size: 0.85rem; text-transform: uppercase; }
  .remove-btn:hover { color: #000; }
  .checkout-btn {
    display: block; width: 100%; max-width: 300px; margin: 40px 0 0 auto;
    background: #000; color: #fff; padding: 18px; text-align: center;
    text-transform: uppercase; font-weight: 600; letter-spacing: 1px;
    border: 1px solid #000; text-decoration: none; transition: 0.3s;
  }
  .checkout-btn:hover { background: #fff; color: #000; text-decoration: none; }
</style>

<div id="cartApp">
  <div class="cart-title">Shopping Bag</div>
  <div v-for="item in items" :key="item.id" class="cart-item">
    <div class="cart-left">
      <a :href="'/product/' + item.product.id">
          <img :src="'/static/uploads/' + item.product.image" :alt="item.product.name">
      </a>
      <div>
        <div class="cart-name">[[ item.product.name ]]</div>
        <div class="cart-price">[[ item.price ]] ៛</div>
      </div>
    </div>
    <div class="qty-box">
      <button class="qty-btn" @click="decrease(item)">-</button>
      <input class="qty-input" type="number" v-model.number="item.quantity" :max="item.stock" @input="update(item)">
      <button class="qty-btn" @click="increase(item)">+</button>
    </div>
    <div class="subtotal">[[ item.price * item.quantity ]] ៛</div>
    <button class="remove-btn" @click="removeItem(item.id)">Remove</button>
  </div>
  <a href="/payment" class="checkout-btn" :style="{ opacity: total <= 0 ? 0.5 : 1, pointerEvents: total <= 0 ? 'none' : 'auto' }">
    Checkout — [[ total ]] ៛
  </a>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
const { createApp } = Vue;
createApp({
  delimiters: ['[[', ']]'],
  data() { return { items: {{ items | tojson }}, timer: null } },
  computed: { total() { return this.items.reduce((s, i) => s + i.price * i.quantity, 0); } },
  methods: {
    increase(item) { if (item.quantity < item.stock) { item.quantity++; this.update(item); } },
    decrease(item) { if (item.quantity > 1) { item.quantity--; this.update(item); } },
    update(item) {
      clearTimeout(this.timer);
      this.timer = setTimeout(() => {
        fetch("/cart/update", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ item_id: item.id, qty: item.quantity })
        });
      }, 300);
    },
    removeItem(id) {
      fetch("/cart/remove", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ item_id: id }) });
      this.items = this.items.filter(i => i.id !== id);
    }
  }
}).mount("#cartApp");
</script>
{% endblock %}
