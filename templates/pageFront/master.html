<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keyz Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #000000;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header Modernization */
    header {
      border-bottom: 1px solid #e0e0e0;
      background: #ffffff;
    }
    .brand h4 {
      font-weight: 800;
      letter-spacing: -1px;
      color: #000;
      text-transform: uppercase;
      margin: 0;
    }
    .brand a { text-decoration: none; }

    /* Desktop Navigation Menu */
    .nav-links {
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .nav-links a {
      color: #000;
      text-decoration: none;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    .nav-links a:hover {
      opacity: 0.5;
      text-decoration: none;
    }

    /* Icons */
    .icons a {
      color: #000;
      font-size: 1.2rem;
      margin-left: 20px;
      transition: opacity 0.2s;
    }
    .icons a:hover { opacity: 0.5; text-decoration: none; }

    /* Footer Modernization */
    footer {
      border-top: 1px solid #e0e0e0;
      background: #000;
      color: #fff;
      margin-top: auto;
    }
    footer a { color: #a0a0a0; transition: color 0.2s; }
    footer a:hover { color: #fff; text-decoration: none; }
    footer h5, footer h6 { font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .social a { color: #fff; margin-right: 15px; font-size: 1.2rem; }
    .bottom { border-top: 1px solid #333; text-align: center; padding: 20px 0; font-size: 0.85rem; color: #777; }
  </style>
</head>

<body>
  <header class="py-4">
    <div class="container d-flex justify-content-between align-items-center">

      <div class="brand d-flex align-items-center">
          <a href="{{ url_for('home') }}">
              <h4>Keyz Store</h4>
          </a>
      </div>

      <nav class="d-none d-md-block">
        <ul class="nav-links">
          <li><a href="{{ url_for('home') }}">Home</a></li>
          <li><a href="{{ url_for('about') }}">About</a></li>
          <li><a href="{{ url_for('contact') }}">Contact</a></li>
        </ul>
      </nav>

      <div class="icons d-flex align-items-center">
        <a href="{{ url_for('login') }}"><i class="fa fa-user"></i></a>
        <a href="#"><i class="fa fa-heart"></i></a>
        <a href="{{ url_for('cart') }}"><i class="fa fa-shopping-cart"></i></a>
      </div>

    </div>
  </header>

  <main class="flex-fill py-5">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer>
    <div class="container py-5 d-flex flex-wrap justify-content-between">
      <div class="mb-4" style="max-width: 300px;">
        <h5>Keyz Store</h5>
        <p style="color: #a0a0a0; font-size: 0.9rem;">Curated essentials for the modern lifestyle. Minimal design, maximum impact.</p>
      </div>
      <div class="mb-4">
        <h6>Quick Links</h6>
        <ul class="list-unstyled" style="font-size: 0.9rem;">
          <li><a href="{{ url_for('home') }}">Home</a></li>
          <li><a href="{{ url_for('about') }}">About</a></li>
          <li><a href="{{ url_for('contact') }}">Contact</a></li>
        </ul>
      </div>
      <div class="mb-4">
        <h6>Follow Us</h6>
        <div class="social">
          <a href="#"><i class="fab fa-facebook"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
      </div>
    </div>
    <div class="bottom">
      &copy; 2026 Keyz Store | All Rights Reserved
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
